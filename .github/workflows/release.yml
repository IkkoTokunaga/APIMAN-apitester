name: Release to Docker Hub

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build from (default: current branch)'
        required: false
        default: ''

permissions:
  contents: write

env:
  IMAGE: tokuppee15/api-tester

jobs:
  # ============================================================
  # Stage 1: 各アーキテクチャをネイティブランナーで並列ビルド
  #   - amd64 -> ubuntu-latest
  #   - arm64 -> ubuntu-24.04-arm (GitHub Free public repo で利用可)
  # それぞれ digest のみ push し、成果物をアーティファクトに保存する
  # ============================================================
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Extract Docker metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=${{ env.PLATFORM_PAIR }},mode=max
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # ============================================================
  # Stage 2: マニフェストリスト（= マルチアーキ image）を作成
  #   - 各 digest をまとめて `:latest` / `:X.Y.Z` / `:X.Y` タグで push
  # ============================================================
  merge:
    name: Create manifest list
    needs: [build]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/v') }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}

  # ============================================================
  # Stage 3: Docker Hub の README を自動同期（タグ push 時のみ）
  # ============================================================
  dockerhub-description:
    name: Sync Docker Hub description
    needs: [merge]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE }}
          readme-filepath: ./README.md
          short-description: Laravel 12 + Alpine.js + Tailwind CSS v4 で構築された API テスター (multi-arch)

  # ============================================================
  # Stage 4: GitHub Release を自動作成（タグ push 時のみ）
  # ============================================================
  github-release:
    name: Create GitHub Release
    needs: [merge]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          tag="${GITHUB_REF_NAME}"
          prev_tag=$(git describe --tags --abbrev=0 "${tag}^" 2>/dev/null || echo "")
          if [ -z "$prev_tag" ]; then
            commits=$(git log --pretty=format:'- %s (%h)' "${tag}")
            compare=""
          else
            commits=$(git log --pretty=format:'- %s (%h)' "${prev_tag}..${tag}")
            compare="**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${prev_tag}...${tag}"
          fi
          {
            echo "body<<GH_EOF"
            echo "## Docker Image"
            echo ""
            echo '```bash'
            echo "docker pull ${{ env.IMAGE }}:${tag#v}"
            echo '```'
            echo ""
            echo "Supported platforms: \`linux/amd64\`, \`linux/arm64\`"
            echo ""
            echo "## Changes"
            echo ""
            echo "$commits"
            echo ""
            echo "$compare"
            echo "GH_EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
